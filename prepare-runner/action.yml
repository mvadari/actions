name: Prepare runner
description: Install packages, set environment variables, create directories

inputs:
  enable_ccache:
    description: Whether ccache should be enabled
    required: true

runs:
  using: composite
  steps:
    - name: Delete old build tools installed using Homebrew (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        brew uninstall --force \
          cmake \
          conan \
          rust

    - name: Trust AWS Homebrew tap (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: brew trust aws/aws

    - name: Install build tools using Homebrew (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        brew install --quiet \
          ca-certificates \
          ccache \
          clang-build-analyzer \
          colima \
          coreutils \
          corrosion \
          docker \
          ninja \
          python@3.14

    - name: Cleanup Homebrew (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: brew cleanup --prune=all --scrub

    - name: List software installed using Homebrew (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: brew list --version

    - name: Install build tools using pip (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        pip3 install --break-system-packages \
          cmake==4.3.4 \
          conan==2.29.1

    - name: Export Rust variables (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Install rustup (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        if [ -x "$HOME/.cargo/bin/rustup" ] || command -v rustup >/dev/null 2>&1; then
          echo "rustup already installed; skipping installation"
        else
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain stable \
            --profile minimal
        fi

    - name: Install cargo tools using cargo-binstall (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        CARGO_BIN="$HOME/.cargo/bin"
        export PATH="$CARGO_BIN:$PATH"

        if [ -x "$CARGO_BIN/cargo-binstall" ] || command -v cargo-binstall >/dev/null 2>&1; then
          echo "cargo-binstall already installed; skipping installation"
        else
          curl --proto '=https' --tlsv1.2 -sSf -L \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        fi

        cargo binstall --no-confirm \
          cargo-audit \
          cargo-llvm-cov \
          cargo-nextest

    - name: Set up Python (Windows)
      if: ${{ runner.os == 'Windows' }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: 3.13
    - name: Install build tools using pip (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        pip install \
          conan==2.24.0

    - name: Install build tools using chocolatey (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        # Note: Using version 4.12.x causes Windows Debug builds to fail.
        choco install -y ccache --version 4.11.3 --allow-downgrade

    - name: Export Rust variables (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        echo "CARGO_HOME=Z:\cargo" >> $GITHUB_ENV
        echo "RUSTUP_HOME=Z:\rustup" >> $GITHUB_ENV
        echo "Z:\cargo\bin" >> $GITHUB_PATH

    - name: Install Rust (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        # Download rustup-init.exe directly (the sh.rustup.rs wrapper auto-detects
        # --default-host as gnu in bash, causing a duplicate-flag error if we override it)
        curl --proto '=https' --tlsv1.2 -sSf -o rustup-init.exe https://win.rustup.rs/x86_64
        ./rustup-init.exe -y --default-toolchain=1.91.1 --default-host=x86_64-pc-windows-msvc
        rm -f rustup-init.exe

    - name: Install Rust toolchain (macOS and Windows)
      if: ${{ runner.os == 'macOS' || runner.os == 'Windows' }}
      shell: bash
      run: |
        rustup show active-toolchain || rustup toolchain install
        rustup component add clippy rustfmt

    - name: Fix git permissions
      shell: bash
      run: git config --global --add safe.directory "$PWD"

    - name: Set env variables (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: |
        echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
        echo "CONAN_HOME=${{ github.workspace }}/.conan2" >> $GITHUB_ENV

    - name: Set env variables (Linux)
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: |
        echo "CCACHE_DIR=/root/.ccache" >> $GITHUB_ENV
        echo "CONAN_HOME=/root/.conan2" >> $GITHUB_ENV

    - name: Set env variables (Windows)
      if: ${{ runner.os == 'Windows' }}
      shell: bash
      run: |
        echo "CCACHE_DIR=${{ github.workspace }}\.ccache" >> $GITHUB_ENV
        echo "CONAN_HOME=${{ github.workspace }}\.conan2" >> $GITHUB_ENV

    - name: Set CCACHE_DISABLE=1
      if: ${{ inputs.enable_ccache == 'false' }}
      shell: bash
      run: |
        echo "CCACHE_DISABLE=1" >> $GITHUB_ENV

    - name: Create directories
      shell: bash
      run: |
        mkdir -p "$CCACHE_DIR"
        mkdir -p "$CONAN_HOME"
