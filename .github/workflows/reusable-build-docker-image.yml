# Build a single-platform Docker image. On push, the image is pushed to
# GHCR with arch-suffixed tags (e.g. `:latest-amd64`, `:sha-abc-amd64`)
# so the calling workflow can stitch per-arch builds into a multi-arch
# manifest without needing to pass digests around.
name: Reusable build Docker image (single platform)

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name without tag (e.g. 'xrpld/nix-ubuntu')"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile, relative to the repository root"
        required: true
        type: string
      base_image:
        description: "Value passed to the Dockerfile as the BASE_IMAGE build arg"
        required: true
        type: string
      platform:
        description: "Docker platform string, e.g. linux/amd64"
        required: true
        type: string
      runner:
        description: "GitHub Actions runner label to build on"
        required: true
        type: string
      push:
        description: "Whether to push the image to GHCR"
        required: true
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ inputs.platform }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set GHCR_REPO
        id: set-ghcr-repo
        run: |
          echo "GHCR_REPO=$(echo ghcr.io/${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >>${GITHUB_OUTPUT}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine arch
        id: vars
        env:
          PLATFORM: ${{ inputs.platform }}
        run: |
          echo "arch=${PLATFORM##*/}" >>$GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.set-ghcr-repo.outputs.GHCR_REPO }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
          flavor: |
            suffix=-${{ steps.vars.outputs.arch }},onlatest=true

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platform }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BASE_IMAGE=${{ inputs.base_image }}
