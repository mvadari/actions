name: Reusable build and merge Docker image (multi-arch)

on:
  workflow_call:
    inputs:
      image_name:
        description: "Image name without tag (e.g. 'xrpld/nix-ubuntu')"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile, relative to the repository root"
        required: true
        type: string
      base_image:
        description: "Value passed to the Dockerfile as the BASE_IMAGE build arg"
        required: true
        type: string
      push:
        description: "Whether to push the image to GHCR"
        required: true
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ inputs.image_name }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    uses: ./.github/workflows/reusable-build-docker-image.yml
    with:
      image_name: ${{ inputs.image_name }}
      dockerfile: ${{ inputs.dockerfile }}
      base_image: ${{ inputs.base_image }}
      platform: ${{ matrix.target.platform }}
      runner: ${{ matrix.target.runner }}
      push: ${{ inputs.push }}

  merge:
    name: Merge ${{ inputs.image_name }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set GHCR_REPO
        id: set-ghcr-repo
        run: |
          echo "GHCR_REPO=$(echo ghcr.io/${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >>${GITHUB_OUTPUT}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.set-ghcr-repo.outputs.GHCR_REPO }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        if: ${{ inputs.push }}
        run: |
          for tag in $(jq -cr '.tags[]' <<<"$DOCKER_METADATA_OUTPUT_JSON"); do
              docker buildx imagetools create -t "$tag" "${tag}-amd64" "${tag}-arm64"
          done

      - name: Inspect image
        if: ${{ inputs.push }}
        env:
          IMAGE_NAME: ${{ steps.set-ghcr-repo.outputs.GHCR_REPO }}/${{ inputs.image_name }}
          IMAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${IMAGE_VERSION}"
