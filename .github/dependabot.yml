version: 2

updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /cleanup-workspace/
      - /configure-github-app/
      - /create-issue/
      - /get-nproc/
      - /prepare-runner/
      - /print-build-env/
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Etc/GMT
    commit-message:
      prefix: "ci: [DEPENDABOT] "
    target-branch: main
